server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Видео/фото при публикации могут быть крупными.
    client_max_body_size 100m;

    # API → backend (роуты под /api/*, включая IG OAuth callback).
    location /api/ {
        proxy_pass http://postwave-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # IG-видео публикуется асинхронно — ждём дольше.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Загруженные медиа отдаёт backend.
    location /media/ {
        proxy_pass http://postwave-api:8000;
        proxy_set_header Host $host;
    }

    # Privacy/Terms — нужны Meta, отдаёт backend.
    location = /privacy { proxy_pass http://postwave-api:8000; }
    location = /terms   { proxy_pass http://postwave-api:8000; }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
