<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#5b3df5" />
    <title>Postwave — посты и продажи в одном окне</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Liquid-glass: SVG-фильтр преломления фона (feTurbulence + feDisplacementMap).
         Применяется через backdrop-filter: url(#pw-liquid-glass). Chromium-only;
         в Safari/Firefox остаётся обычный блюр (см. .pw-social-pop в index.css). -->
    <svg
      width="0"
      height="0"
      style="position: absolute; overflow: hidden"
      aria-hidden="true"
    >
      <filter
        id="pw-liquid-glass"
        x="0%"
        y="0%"
        width="100%"
        height="100%"
        color-interpolation-filters="sRGB"
      >
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.013 0.013"
          numOctaves="2"
          seed="42"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="1.4" result="softNoise" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="softNoise"
          scale="58"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
