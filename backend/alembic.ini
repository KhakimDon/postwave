# Alembic config. The DB URL is NOT set here -- env.py pulls it from
# app.config.Settings (the same DATABASE_URL from .env the app uses).

[alembic]
script_location = alembic
prepend_sys_path = .
# revision filenames: <epoch>_<slug>.py -- ordered and readable
file_template = %%(epoch)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
